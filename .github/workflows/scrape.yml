name: Scrape UMaine Sports Data

on:
  schedule:
    - cron: '0 12 * * *'   # 7 AM Eastern (12:00 UTC)
    - cron: '0 2 * * *'    # 9 PM Eastern (02:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python -m scraper.main

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: update $(date -u +%Y-%m-%d-%H%M)" && git push
